services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: law-agent-postgres
    environment:
      POSTGRES_DB: law_agent
      POSTGRES_USER: law_agent
      POSTGRES_PASSWORD: law_agent
    ports:
      - "5432:5432"
    volumes:
      - law_agent_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: law-agent-redis
    ports:
      - "6379:6379"

  backend:
    image: maven:3.9.9-eclipse-temurin-21
    working_dir: /app
    command: mvn spring-boot:run
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/law_agent
      DB_USER: law_agent
      DB_PASSWORD: law_agent
      REDIS_HOST: redis
      JWT_SECRET: change-me-change-me-change-me-change-me-32
      LLM_PROVIDER: mock
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - maven_cache:/root/.m2
    depends_on:
      - postgres
      - redis

  frontend:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

volumes:
  law_agent_pg:
  maven_cache:
